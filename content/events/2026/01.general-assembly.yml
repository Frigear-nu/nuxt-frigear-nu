# Tickets and ticket products
defaultTicket: default
requirements:
  - type: membership # the only supported type of requirement for now
    title:
      da: Bare for medlemmer
      en: Members only
    method: any # this is the default value
tickets:
  # We cna have a free ticket, (arbitrary how many type you want to add.)
  default:
    name:
      da: Adgang
      en: Admission
    description:
      da: "[{{ticket}} billett]{.text-primary}"
      en: "[{{ticket}} ticket]{.text-primary}."
    price: 0
    hidePrice: true
    stripeId: "${default_ticket_stripe_id}"
    currency: DKK
