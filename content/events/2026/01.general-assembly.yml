      da: Medlemmer
      en: Members
    icon: i-lucide-user-star
    color: warning
tickets:
  # We cna have a free ticket, (arbitrary how many type you want to add.)
  default:
    name:
      da: Tilmelding
      en: Admission
    description:
      da: "[{{ticket}}s billet]{.text-primary}"
      en: "[{{ticket}} ticket]{.text-primary}."
    price: 0
    hidePrice: true
    stripeId: "${default_ticket_stripe_id}"
    currency: DKK
    products:
      title:
        da: Mad
        en: Food
      require: one_of
      items:
