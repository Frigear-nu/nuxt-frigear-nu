# Tickets and ticket products
defaultTicket: default
tickets:
  # We can have a free ticket, (arbitrary how many types you want to add to `tickets.<any-key>`)
  default:
    stripeId: prod_U3cYQWfWJTh40Q # this is a free ticket -> but we require "one_of" products
    name:
      da: Adgang
      en: Admission
    description:
      da: "[{{ticket}} billett]{.text-primary} til alle festligheter i Frigear. :br det er veldig godt at lave en god beskrivelse for no."
      en: |
        [{{ticket}} ticket]{.text-primary}.
          
        - 100% gratis for alle
    price: 0
    # this "hidePrice: boolean | undefined" prevents showing "Free" or "Gratis" next to the main ticket, since this
    # event only has a single ticket and prices are determined based on food.
    hidePrice: false
    currency: DKK
    products:
      # this should probably be on the individual ticket...
      require: one_of # require at least one of the products below to be selected
      # TODO: Might be nice to have multiple "categories" or addons separated - like "steps"?
      title:
        da: Mad
        en: Food
      items:
        - id: prod_U3ceq0o7yfwf66
          label: Carnivore
          description:
            da: Dansk Carnivore beskrivelse
            en: |
              English [Carnivore]{.font-bold.text-primary} description
          # This must be provided, so there is some work to keep things in sync for now.
          price: 52.66
          currency: DKK
        - id: prod_U3cd1y2poAqNyl
          label: Vegan
          description:
            da: Vegansk beskrivelse
            en: |
              English [Vegan]{.font-bold.text-primary} description. :br
              This supports _full_ markdown - but no nuxt-ui components.
          price: 52.67
          currency: DKK
  premium:
    name:
      da: Premium billett
      en: Premium ticket
    description:
      da: Premium billett.
