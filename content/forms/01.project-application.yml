name: project-application
title: forms.projectApplication.title
description: forms.projectApplication.description
delivery:
  - channel: email
    destination: ["${contact.default}"]
# In the future we could define forms a bit like this
form:
  steps:
    - id: personal
      icon: i-lucide-user
      fields:
        - name: name
          label: forms.projectApplication.name
          rules: text|required|min:3|max:255
        - name: dob
          label: forms.projectApplication.dob
          rules: date|required
        - name: startingAt
          label: forms.projectApplication.startingAt
          rules: datetime|required
        - name: description
          label: forms.projectApplication.description
          rules: textarea|required|min:3|max:255
        - name: avatar
          label: forms.projectApplication.avatar
          rules: file|required
        - name: attachments
          label: forms.projectApplication.attachments
          rules: file|array|min:1|max:10|maxsize:10240
        - name: notes
          label: forms.projectApplication.notes
          rules: textarea|array