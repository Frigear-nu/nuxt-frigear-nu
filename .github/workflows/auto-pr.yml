name: Auto PR

on:
  push:
    branches:
      - staging

jobs:
  open-pr:
    name: "Open PR: Staging -> Production"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit log
        id: commits
        run: |
          LOG=$(git log origin/main..HEAD --pretty=format:"- %s (%an)" --no-merges)
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update PR to main
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: staging
          title: "🚀 Deploy to production"
          labels: production
          body: |
            This PR was automatically created when staging was updated.

            **Merging this PR will deploy to production.**

            ### Commits
            ${{ steps.commits.outputs.log }}

            ---
            Last push by: @${{ github.actor }}
            Staging SHA: `${{ github.sha }}`

      - name: Print PR link to job summary
        run: |
          echo "## 🚀 Production PR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | [#${{ steps.pr.outputs.pull-request-number }}](${{ steps.pr.outputs.pull-request-url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.pr.outputs.pull-request-operation }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Annotate with PR link
        run: |
          echo "::notice title=🚀 Production PR #${{ steps.pr.outputs.pull-request-number }}::${{ steps.pr.outputs.pull-request-url }}"