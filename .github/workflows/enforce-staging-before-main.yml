# .github/workflows/enforce-staging-first.yml
name: Enforce Staging

on:
  pull_request:
    branches:
      - main

jobs:
  check-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if branch is merged into staging
        run: |
          git fetch origin staging
          
          # Check if the PR branch is already in staging
          MERGE_BASE=$(git merge-base origin/staging ${{ github.event.pull_request.head.sha }})
          
          if git branch -r --contains ${{ github.event.pull_request.head.sha }} | grep -q 'origin/staging'; then
            echo "✅ Branch exists in staging. Proceeding."
          else
            echo "❌ This branch must be merged into staging before main."
            exit 1
          fi